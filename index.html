<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Homepage</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dinner Builder" />
    <link rel="apple-touch-icon" href="images/dinnerBuilderIcon.png" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="icon" href="images/favicon.ico" type="image/x-icon" />
  </head>

  <body class="is-preload">
    <!-- Wrapper -->
    <div id="wrapper">
      <!-- Header -->
      <section class="intro">
        <header>
          <h1>Welcome</h1>
        </header>
      </section>

      <section id="page navigation">

        <div class="content">
          <p>Click a button below to navigate</p>
          <a href="dinner-builder.html" class="button">Dinner Builder 🍽️ </a>

          <header>
            <h2>Holidays</h2>
          </header>

          <div id="holiday-video-map" style="height: 420px; width: 100%; border-radius: 0.325rem; overflow: hidden;"></div>

          <a href="holiday.html" class="button" style="margin-top: 1.5em;">Round the world route 📍</a>
          <a href="wedding/index.html" class="button">Wedding 💍</a>

        </div>
      </section>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      const holidayVideos = [
        { name: "Australia 🇦🇺",  lat: -33.87, lng: 151.21, url: "https://youtu.be/OsZapyqLboA?si=FemARRiEDwGdMVIa" },
        { name: "New Zealand 🇳🇿", lat: -40.90, lng: 174.89, url: "https://youtu.be/OsZapyqLboA?si=FemARRiEDwGdMVIa" },
        { name: "Canada 🇨🇦",      lat:  51.18, lng: -115.57, url: "https://youtu.be/0MqJJRiC1aA?si=0crMjy4xgs6JUzk3" },
        { name: "Spain 🇪🇸",       lat:  40.46, lng:  -3.75, url: "https://youtu.be/D_U_Qn6WTts?si=gfHOlwY8FKjL7_d7" },
        { name: "New York 🇺🇸",    lat:  40.71, lng: -74.01, url: "https://youtu.be/pZnJG-Nr4mc?si=rXZI6gLS8EL1bWXw" },
        { name: "Japan 🇯🇵",       lat:  36.20, lng: 138.25, url: "https://youtu.be/QyRlQbJytrA?si=VsW1mmr74Gqk81bh" },
        { name: "Maldives 🇲🇻",    lat:   3.20, lng:  73.22, url: "https://youtu.be/vYATH8e-Slc?si=gnjD7PbuoN4JjuJS" },
        { name: "Qatar 🇶🇦",       lat:  25.35, lng:  51.18, url: "https://youtu.be/EJ2TaDRKxBI?si=W2RhAq3yUe1vO70C" },
        { name: "Scotland 🏴󠁧󠁢󠁳󠁣󠁴󠁿",   lat:  56.49, lng:  -4.20, url: "https://youtu.be/0Y6JhIELpsk?si=9dABVBVKmJoTj2QV" },
        { name: "Edinburgh 🏴󠁧󠁢󠁳󠁣󠁴󠁿",  lat:  55.95, lng:  -3.19, url: "https://youtu.be/BoQgrntJ-jA?si=1lWRly6Hix6ZpJEr" },
        { name: "Prague 🇨🇿",      lat:  50.08, lng:  14.44, url: "https://youtu.be/fyfflTX5g0A?si=7mcS5x0PzBP3o4xb" },
        { name: "Tunisia 🇹🇳",     lat:  33.89, lng:   9.54, url: "https://youtu.be/VneafOUV0iE?si=bzWIHp1QgWKA5JRN" },
        { name: "Amsterdam 🇳🇱",   lat:  52.37, lng:   4.90, url: "https://youtu.be/ycuUgk6SNgA?si=CMDmDj8A2IylFNaj" },
        { name: "Italy 🇮🇹",       lat:  41.87, lng:  12.57, url: "https://youtu.be/hDJfMAFUaS4?si=4HkjkixxjaV2djXq" },
        { name: "Paris 🇫🇷",       lat:  48.86, lng:   2.35, url: "https://youtu.be/tja4_2vH8_Q?si=EHbdWlx7HP0omLwC" },
      ];

      const videoMap = L.map("holiday-video-map", {
        zoomControl: true,
        maxBounds: [[-85, -540], [85, 540]],
        maxBoundsViscosity: 1.0,
      }).setView([30, 20], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(videoMap);

      holidayVideos.forEach(function(place) {
        [-360, 0, 360].forEach(function(offset) {
          L.marker([place.lat, place.lng + offset])
            .addTo(videoMap)
            .bindPopup('<b>' + place.name + '</b><br><a href="' + place.url + '" target="_blank" rel="noopener">Watch video ▶</a>');
        });
      });
    </script>
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
